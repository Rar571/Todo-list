{% extends 'todo/base.html' %}

{% block content %}
<h2>{% if object %}Update Element{% else %}Create New Element{% endif %}</h2>

<form method="post" novalidate class="mt-4">
    {% csrf_token %}

    {{ form.as_p }}

    <div class="d-flex gap-2 mt-4">
        <a href="{% url 'todo:task-list' %}" class="btn btn-light border px-4">Cancel</a>
        <button type="submit" class="btn btn-primary px-4">Save</button>
    </div>
</form>
{% endblock %}

{% extends 'todo/base.html' %}

{% block content %}
<div class="card shadow-sm border-danger col-md-6 mx-auto mt-5">
    <div class="card-header bg-danger text-white">
        <h5 class="mb-0">Confirm Deletion</h5>
    </div>
    <div class="card-body text-center">
        <p class="fs-5">Are you sure you want to delete this item?</p>
        <p class="text-muted"><em>"{{ object }}"</em></p>

        <form method="post" class="mt-4 d-flex justify-content-center gap-3">
            {% csrf_token %}
            <a class="btn btn-light">Cancel</a>
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
    </div>
</div>
{% endblock %}
